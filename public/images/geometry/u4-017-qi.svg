<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="200" fill="#fff9f2" />
  <!-- Card 891 -->
  <rect x="50" y="60" width="80" height="80" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2" />
  <text x="90" y="115" font-size="32" font-weight="bold" text-anchor="middle" fill="#1e3a8a">891</text>
  
  <path d="M 150 100 L 180 100" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <text x="165" y="90" font-size="10" text-anchor="middle" fill="#64748b">180° 돌리기</text>
  
  <!-- Empty Card for Result -->
  <rect x="200" y="60" width="80" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-dasharray="4" />
  <text x="240" y="115" font-size="24" text-anchor="middle" fill="#94a3b8">?</text>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
