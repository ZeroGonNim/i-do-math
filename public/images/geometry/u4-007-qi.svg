<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Grid (5x5) -->
  <rect width="300" height="200" fill="#fff9f2" />
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="200" height="200" x="50" y="0" fill="url(#grid)" stroke="#cbd5e1" />
  
  <!-- Shape '가' (Left) -->
  <path d="M 60 60 L 100 60 L 100 100 L 60 100 Z" fill="#3b82f6" fill-opacity="0.6" stroke="#2563eb" stroke-width="2" />
  <text x="75" y="85" font-size="16" font-weight="bold" fill="#1e3a8a">가</text>
  
  <!-- Shape '나' (Right by 3 units = 120px) -->
  <path d="M 180 60 L 220 60 L 220 100 L 180 100 Z" fill="#ef4444" fill-opacity="0.6" stroke="#dc2626" stroke-width="2" />
  <text x="195" y="85" font-size="16" font-weight="bold" fill="#7f1d1d">나</text>
  
  <!-- Help Labels -->
  <text x="10" y="190" font-size="10" fill="#94a3b8">격자 한 칸 = 1 cm</text>
</svg>
