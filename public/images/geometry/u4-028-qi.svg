<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="200" fill="#fff9f2" />
  <!-- Minseok (Flip) -->
  <text x="70" y="40" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">민석 (뒤집기)</text>
  <g transform="translate(30, 50)">
    <path d="M 0 0 L 20 0 L 0 20 Z" fill="#3b82f6" />
    <path d="M 40 0 L 60 0 L 60 20 Z" fill="#3b82f6" transform="translate(20, 0)" />
    <path d="M 80 0 L 100 0 L 80 20 Z" fill="#3b82f6" transform="translate(40, 0)" />
  </g>
  
  <!-- Seojun (Rotate) -->
  <text x="220" y="40" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">서준 (돌리기)</text>
  <g transform="translate(180, 50)">
    <path d="M 0 0 L 20 0 L 0 20 Z" fill="#ef4444" />
    <path d="M 20 0 L 20 20 L 0 0 Z" fill="#ef4444" transform="rotate(90, 30, 10)" />
    <path d="M 20 20 L 0 20 L 20 0 Z" fill="#ef4444" transform="rotate(180, 50, 10)" />
  </g>
</svg>
