<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="200" fill="#fff9f2" />
  <!-- Two base shapes -->
  <g transform="translate(20, 50)">
    <rect width="30" height="30" fill="#3b82f6" stroke="#1e3a8a" />
    <path d="M 40 0 L 70 30 L 40 30 Z" fill="#ef4444" stroke="#7f1d1d" />
    <text x="35" y="50" font-size="10" text-anchor="middle" fill="#64748b">[ 모양 ]</text>
  </g>
  
  <!-- Complex pattern -->
  <g transform="translate(120, 40)">
    <rect width="120" height="80" fill="#fff" stroke="#cbd5e1" stroke-dasharray="2" />
    <!-- Row 1 -->
    <rect x="0" y="0" width="20" height="20" fill="#3b82f6" opacity="0.6" />
    <path d="M 20 0 L 40 20 L 20 20 Z" fill="#ef4444" opacity="0.6" />
    <rect x="40" y="0" width="20" height="20" fill="#3b82f6" opacity="0.6" />
    <path d="M 60 0 L 80 20 L 60 20 Z" fill="#ef4444" opacity="0.6" />
    <!-- Row 2 (Flipped) -->
    <rect x="0" y="20" width="20" height="20" fill="#3b82f6" opacity="0.4" />
    <path d="M 20 40 L 40 20 L 20 20 Z" fill="#ef4444" opacity="0.4" />
  </g>
  <text x="180" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e293b">이 무늬는 어떻게 만들었을까요?</text>
</svg>
